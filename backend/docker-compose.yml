# Yerel geliştirme: sadece PostgreSQL (Prisma / backend için)
# Kullanım: backend klasöründe `docker compose up -d`
# Sonra: npx prisma migrate deploy && npm run dev

services:
  db:
    image: postgres:15-alpine
    container_name: influencehub-pg
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: influencehub
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: secret
    volumes:
      - influencehub_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d influencehub"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  influencehub_pgdata:
